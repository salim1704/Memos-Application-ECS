name: Health Check

on:
  workflow_run:
    workflows: ["Terraform"]
    types: [completed]
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 60

      - name: Health Check
        run: bash scripts/health-check.sh
          
      - name: Summary
        if: success()
        run: echo "Health check complete (200 OK)"
